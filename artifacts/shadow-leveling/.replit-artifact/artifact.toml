kind = "web"
previewPath = "/"
title = "Shadow Leveling - Gamified Habit Tracker"
version = "1.0.0"
id = "artifacts/shadow-leveling"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 3000

[services.development]
run = "pnpm --filter @workspace/shadow-leveling run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shadow-leveling", "run", "build" ]
publicDir = "artifacts/shadow-leveling/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3000"
BASE_PATH = "/"
